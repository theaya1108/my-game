<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Mini-games</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('bg_main.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a1a2e; 
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #scaler-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 450px;
            height: 750px;
            transform-origin: center center;
            position: relative;
        }

        #main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 450px;
            height: 750px;
        }

        h1 { 
            margin: 5px 0 5px 0; 
            color: #ffffff; 
            font-size: 32px;
            text-align: center;
        }
        
        .control-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            height: 85px; /* 👑 配合 80x80 按鈕，稍微調高控制列高度確保排版完美 */
            box-sizing: border-box;
            pointer-events: none; 
            position: relative;
            z-index: 10; 
        }
        
        .status-container { 
            font-size: 20px; 
            font-weight: bold; 
            display: flex;
            gap: 20px; 
            pointer-events: none; 
        }
        
        /* UI 按鈕動畫 */
        @keyframes breatheShake {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes jellyShake {
            0% { transform: scale(1) rotate(0deg); }
            15% { transform: scale(1.15) rotate(-6deg); }
            30% { transform: scale(1.05) rotate(5deg); }
            45% { transform: scale(1.1) rotate(-3deg); }
            60% { transform: scale(1.02) rotate(2deg); }
            75% { transform: scale(1.05) rotate(-1deg); }
            100% { transform: scale(1.05) rotate(0deg); }
        }
        
        .btn {
            border: none;
            cursor: pointer;
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent; 
            color: transparent; 
            overflow: hidden;
            box-shadow: none; 
            animation: breatheShake 4s ease-in-out infinite; 
            transform-origin: center bottom;
            pointer-events: auto; 
        }
        .btn:hover { 
            filter: brightness(1.2); 
            animation: jellyShake 0.6s ease-in-out forwards; 
        }
        .btn:active { transform: scale(0.92); }

        /* 👑 修正：重來按鈕正式升級至 80*80 */
        #btn-restart { 
            width: 80px; 
            height: 80px; 
            background-image: url('btn_restart.png'); 
            animation-delay: 0.5s; 
        }
        
        /* 暫停按鈕維持 60*60 */
        #btn-pause { 
            width: 60px; 
            height: 60px; 
            background-image: url('btn_pause.png'); 
        }

        /* 遊戲區域框容器 */
        #game-container {
            position: relative;
            width: 450px;
            height: 650px;
            background-image: url('bg_game.png'); 
            background-size: cover;
            background-position: center;
            border: 4px solid #ffffff; 
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            box-sizing: border-box;
            overflow: hidden;
            cursor: pointer;
        }
        
        #game-area canvas {
            background: transparent !important;
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        
        #game-area {
            width: 100%;
            height: 100%;
        }
        
        @keyframes lineBlink {
            0% { border-top-color: rgba(255, 0, 0, 1); filter: drop-shadow(0 0 8px rgba(255,0,0,0.8)); }
            50% { border-top-color: rgba(255, 0, 0, 0.1); filter: drop-shadow(0 0 0px rgba(255,0,0,0)); }
            100% { border-top-color: rgba(255, 0, 0, 1); filter: drop-shadow(0 0 8px rgba(255,0,0,0.8)); }
        }

        #deadline-indicator {
            position: absolute;
            top: 70px; 
            left: 0;
            width: 100%;
            height: 2px;
            border-top: 2px dashed rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 2;
        }

        #deadline-indicator.warning {
            border-top-style: dashed;
            animation: lineBlink 0.4s linear infinite;
        }

        #pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            z-index: 5;
            display: none; 
            pointer-events: none; 
        }

        #fx-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }

        @keyframes unlockBanner {
            0% { transform: translate(-50%, -150%) scale(0.7); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            85% { transform: translate(-50%, -50%) scale(1); opacity: 1; filter: drop-shadow(0 0 25px #ff79c6); }
            100% { transform: translate(-50%, 100%) scale(0.8); opacity: 0; }
        }

        #unlock-banner {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: linear-gradient(135deg, rgba(255,121,198,0.95), rgba(189,147,249,0.95));
            border: 3px solid #ffffff;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255,105,180,0.8), inset 0 0 15px rgba(255,255,255,0.6);
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            z-index: 20;
            display: none;
            pointer-events: none;
        }

        #unlock-banner h2 {
            margin: 0 0 8px 0;
            font-size: 26px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.6);
        }

        #unlock-banner p {
            margin: 0;
            font-size: 18px;
            color: #ffffd0;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="scaler-wrapper">
        <div id="main-wrapper">
            <h1>Secret Mini-games</h1>
            
            <div class="control-bar">
                <button id="btn-restart" class="btn">重來</button>
                <div class="status-container">
                    <div>時間: <span id="timer">00:00</span></div>
                    <div>分數: <span id="score">0</span></div>
                </div>
                <button id="btn-pause" class="btn">暫停</button>
            </div>
            
            <div id="game-container">
                <div id="pause-overlay">遊戲暫停 ⏳</div>
                <div id="deadline-indicator"></div> 
                <canvas id="fx-canvas"></canvas>
                <div id="unlock-banner">
                    <h2>解鎖第10階 🍷✨</h2>
                    <p>💖 終極秘密關係 💖</p>
                </div>
                <div id="game-area"></div>
            </div>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
        let engine, render, runner;
        
        const width = 442; 
        const height = 642; 
        let score = 0;
        let isPaused = false;
        let isGameOver = false;
        let hasUnlockedMaxLevel = false;

        const deadlineY = 70; 
        let gameOverTimer = null; 

        let bgm = null;
        let isBgmStarted = false;

        const audioPool = {};
        let gameOverAudio = null;

        let currentBallLevel = 1;
        let nextBallLevel = 1;
        let previewBall = null;   
        let nextIndicator = null; 

        let totalSeconds = 0;
        let timerInterval = null;

        let particles = [];
        let fxCanvas, fxCtx;
        let flashOpacity = 0;

        const levels = {
            1:  { radius: 22, color: '#ffb6b9', score: 2,   next: 2,  sound: 'sound1.mp3', freq: 261.63, img: 'img1.png',  imgSize: 60 }, 
            2:  { radius: 30, score: 4,   next: 3,  sound: 'sound2.mp3', freq: 293.66, img: 'img2.png',  imgSize: 90 }, 
            3:  { radius: 38, score: 8,   next: 4,  sound: 'sound3.mp3', freq: 329.63, img: 'img3.png',  imgSize: 120 }, 
            4:  { radius: 46, score: 16,  next: 5,  sound: 'sound4.mp3', freq: 349.23, img: 'img4.png',  imgSize: 150 }, 
            5:  { radius: 54, score: 32,  next: 6,  sound: 'sound5.mp3', freq: 392.00, img: 'img5.png',  imgSize: 180 }, 
            6:  { radius: 62, score: 64,  next: 7,  sound: 'sound6.mp3', freq: 440.00, img: 'img6.png',  imgSize: 220 }, 
            7:  { radius: 72, score: 128, next: 8,  sound: 'sound7.mp3', freq: 493.88, img: 'img7.png',  imgSize: 250 }, 
            8:  { radius: 82, score: 256, next: 9,  sound: 'sound8.mp3', freq: 523.25, img: 'img8.png',  imgSize: 280 }, 
            9:  { radius: 92, score: 512, next: 10, sound: 'sound9.mp3', freq: 587.33, img: 'img9.png',  imgSize: 310 }, 
            10: { radius: 105, score: 1024, next: null, sound: 'sound10.mp3', freq: 659.25, img: 'img10.png', imgSize: 350 } 
        };

        function preloadAudio() {
            for (let lvl in levels) {
                const src = levels[lvl].sound;
                if (!audioPool[src]) {
                    const audio = new Audio(src);
                    audio.preload = 'auto';
                    audio.load(); 
                    audioPool[src] = audio;
                }
            }
            if (!gameOverAudio) {
                gameOverAudio = new Audio('gameover.mp3');
                gameOverAudio.preload = 'auto';
                gameOverAudio.load();
            }
        }
        preloadAudio();

        function handleResize() {
            const wrapper = document.getElementById('scaler-wrapper');
            const windowWidth = document.documentElement.clientWidth || window.innerWidth;
            const windowHeight = document.documentElement.clientHeight || window.innerHeight;
            
            let scaleX = (windowWidth - 16) / 450;
            let scaleY = (windowHeight - 20) / 750;
            let finalScale = Math.min(scaleX, scaleY, 1); 
            
            wrapper.style.transform = `scale(${finalScale})`;
        }
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', handleResize);
        setTimeout(handleResize, 100);

        function startBackgroundMusic() {
            if (isBgmStarted) return;
            try {
                if (!bgm) {
                    bgm = new Audio('bgm.mp3');
                    bgm.loop = true; 
                    bgm.volume = 0.3; 
                }
                bgm.play().then(() => {
                    isBgmStarted = true;
                    document.removeEventListener('click', startBackgroundMusic);
                    document.removeEventListener('touchstart', startBackgroundMusic);
                }).catch(err => {
                    console.log("等待手勢解鎖 BGM");
                });
            } catch (e) {
                console.log("BGM 初始化失敗");
            }
        }

        document.addEventListener('click', startBackgroundMusic);
        document.addEventListener('touchstart', startBackgroundMusic);

        // 👑 預載入音效物件儲存池，徹底消滅手機音效延遲
        function playMergeSound(level) {
            const config = levels[level];
            const cachedAudio = audioPool[config.sound];
            if (cachedAudio) {
                cachedAudio.currentTime = 0; 
                cachedAudio.volume = 0.5;
                cachedAudio.play().catch(e => { playSynthSound(config.freq, 0.3); });
            } else {
                playSynthSound(config.freq, 0.3);
            }
        }

        function playGameOverSound() {
            if (bgm) bgm.volume = 0.05; 
            if (gameOverAudio) {
                gameOverAudio.currentTime = 0;
                gameOverAudio.volume = 0.6;
                gameOverAudio.play().catch(e => { playSynthSound(150, 0.6); });
            } else {
                playSynthSound(150, 0.6);
            }
        }

        function playSynthSound(frequency, duration) {
            try {
                const AudioContext = window.WindowsAudioContext || window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(err) { console.log("音訊建立失敗"); }
        }

        function getRandomBallLevel() {
            return Math.floor(Math.random() * 4) + 1;
        }

        function updateNextIndicator() {
            if (nextIndicator) {
                Composite.remove(engine.world, nextIndicator);
            }
            const config = levels[nextBallLevel];
            const scaleFactor = (18 * 2) / config.imgSize; 

            nextIndicator = Bodies.circle(width - 40, 35, 18, {
                isStatic: true,
                isSensor: true, 
                render: {
                    sprite: {
                        texture: config.img,
                        xScale: scaleFactor,
                        yScale: scaleFactor
                    }
                }
            });
            Composite.add(engine.world, nextIndicator);
        }

        function updatePreviewBall(x) {
            if (isPaused || isGameOver) return;
            const config = levels[currentBallLevel];
            const scaleFactor = (config.radius * 2) / config.imgSize;

            let safeX = x;
            if (safeX < config.radius + 5) safeX = config.radius + 5;
            if (safeX > width - (config.radius + 5)) safeX = width - (config.radius + 5);

            if (!previewBall) {
                previewBall = Bodies.circle(safeX, 35, config.radius, {
                    isStatic: true,
                    isSensor: true,
                    render: {
                        sprite: {
                            texture: config.img,
                            xScale: scaleFactor,
                            yScale: scaleFactor
                        }
                    }
                });
                Composite.add(engine.world, previewBall);
            } else {
                Body.setPosition(previewBall, { x: safeX, y: 35 });
                previewBall.render.sprite.texture = config.img;
                previewBall.render.sprite.xScale = scaleFactor;
                previewBall.render.sprite.yScale = scaleFactor;
            }
        }

        function updatePauseButtonUI() {
            const btn = document.getElementById('btn-pause');
            if (isPaused) {
                btn.style.backgroundImage = "url('btn_resume.png')";
            } else {
                btn.style.backgroundImage = "url('btn_pause.png')";
            }
        }

        function startTimer() {
            stopTimer(); 
            timerInterval = setInterval(() => {
                if (!isPaused && !isGameOver) {
                    totalSeconds++;
                    const minutes = Math.floor(totalSeconds / 60);
                    const seconds = totalSeconds % 60;
                    const formattedMin = String(minutes).padStart(2, '0');
                    const formattedSec = String(seconds).padStart(2, '0');
                    document.getElementById('timer').innerText = `${formattedMin}:${formattedSec}`;
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function spawnRomanticCelebration(startX, startY) {
            flashOpacity = 0.8; 
            particles = []; 
            for (let i = 0; i < 60; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 4; 
                const type = Math.random() > 0.4 ? 'sparkle' : 'heart'; 
                particles.push({
                    x: startX,
                    y: startY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - Math.random() * 3, 
                    radius: Math.random() * 6 + 4,
                    alpha: 1,
                    decay: Math.random() * 0.015 + 0.01, 
                    color: `hsl(${Math.random() * 40 + 330}, 100%, ${Math.random() * 20 + 70}%)`, 
                    type: type,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.1
                });
            }
            const banner = document.getElementById('unlock-banner');
            banner.style.display = 'block';
            banner.style.animation = 'none';
            void banner.offsetWidth; 
            banner.style.animation = 'unlockBanner 4.5s ease-in-out forwards';
            setTimeout(() => { banner.style.display = 'none'; }, 4500);
        }

        function drawFX() {
            fxCtx.clearRect(0, 0, width, height);
            if (flashOpacity > 0) {
                fxCtx.fillStyle = `rgba(255, 182, 193, ${flashOpacity})`;
                fxCtx.fillRect(0, 0, width, height);
                flashOpacity -= 0.02; 
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15; 
                p.alpha -= p.decay;
                p.rotation += p.rotSpeed;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                fxCtx.save();
                fxCtx.globalAlpha = p.alpha;
                fxCtx.translate(p.x, p.y);
                fxCtx.rotate(p.rotation);
                fxCtx.fillStyle = p.color;
                fxCtx.shadowBlur = 15;
                fxCtx.shadowColor = p.color;
                if (p.type === 'sparkle') {
                    fxCtx.beginPath();
                    for (let j = 0; j < 4; j++) {
                        fxCtx.rotate(Math.PI / 2);
                        fxCtx.lineTo(0, p.radius * 1.8);
                        fxCtx.lineTo(p.radius * 0.3, 0);
                    }
                    fxCtx.closePath();
                    fxCtx.fill();
                } else {
                    fxCtx.beginPath();
                    fxCtx.scale(p.radius / 12, p.radius / 12);
                    fxCtx.translate(-12, -12);
                    fxCtx.moveTo(12, 5);
                    fxCtx.bezierCurveTo(12, 4, 11, 2, 8.5, 2, 5.5, 2, 5.5, 6, 5.5, 6, 5.5, 9, 9, 13, 12, 16.5, 15, 13, 18.5, 9, 18.5, 6, 18.5, 6, 18.5, 2, 15.5, 2, 13, 2, 12, 4, 12, 5);
                    fxCtx.fill();
                }
                fxCtx.restore();
            }
            requestAnimationFrame(drawFX);
        }

        function initGame() {
            if (engine) {
                Matter.World.clear(engine.world);
                Matter.Engine.clear(engine);
                document.getElementById('game-area').innerHTML = '';
            }

            if (gameOverTimer) clearTimeout(gameOverTimer);
            gameOverTimer = null;

            fxCanvas = document.getElementById('fx-canvas');
            fxCanvas.width = width;
            fxCanvas.height = height;
            fxCtx = fxCanvas.getContext('2d');
            particles = [];
            flashOpacity = 0;

            engine = Engine.create();
            
            render = Render.create({
                element: document.getElementById('game-area'),
                engine: engine,
                options: { width: width, height: height, wireframes: false, background: 'transparent' } 
            });

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            score = 0;
            document.getElementById('score').innerText = score;
            isPaused = false;
            isGameOver = false; 
            hasUnlockedMaxLevel = false;
            document.getElementById('pause-overlay').style.display = 'none';
            document.getElementById('unlock-banner').style.display = 'none';
            updatePauseButtonUI();
            
            const indicator = document.getElementById('deadline-indicator');
            indicator.className = '';
            indicator.style.borderTopColor = 'rgba(255, 255, 255, 0.4)';

            if (bgm) bgm.volume = 0.3;

            const ground = Bodies.rectangle(width / 2, height + 30, width, 60, { isStatic: true, render: { visible: false } });
            const leftWall = Bodies.rectangle(-30, height / 2, 60, height, { isStatic: true, render: { visible: false } });
            const rightWall = Bodies.rectangle(width + 30, height / 2, 60, height, { isStatic: true, render: { visible: false } });
            Composite.add(engine.world, [ground, leftWall, rightWall]);

            currentBallLevel = getRandomBallLevel();
            nextBallLevel = getRandomBallLevel();
            previewBall = null;
            nextIndicator = null;

            updateNextIndicator();
            updatePreviewBall(width / 2); 

            totalSeconds = 0;
            document.getElementById('timer').innerText = "00:00";
            startTimer();

            setupCollision();
            setupGameLoop(); 

            const handleMove = function(e) {
                const rect = document.getElementById('game-container').getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                
                const matrix = window.getComputedStyle(document.getElementById('scaler-wrapper')).transform;
                let currentScale = 1;
                if (matrix && matrix !== 'none') {
                    currentScale = parseFloat(matrix.split(',')[0].replace('matrix(', '')) || 1;
                }
                const clickX = (clientX - rect.left) / currentScale;
                updatePreviewBall(clickX);
            };

            document.getElementById('game-container').onmousemove = handleMove;
            document.getElementById('game-container').ontouchmove = handleMove;
        }

        const handleRelease = function(e) {
            startBackgroundMusic();

            if (isPaused || isGameOver) return; 

            const rect = document.getElementById('game-container').getBoundingClientRect();
            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            
            const matrix = window.getComputedStyle(document.getElementById('scaler-wrapper')).transform;
            let currentScale = 1;
            if (matrix && matrix !== 'none') {
                currentScale = parseFloat(matrix.split(',')[0].replace('matrix(', '')) || 1;
            }
            const clickX = (clientX - rect.left) / currentScale;
            
            if (clickX > 0 && clickX < width) {
                const config = levels[currentBallLevel];
                
                let safeX = clickX;
                if (safeX < config.radius + 5) safeX = config.radius + 5;
                if (safeX > width - (config.radius + 5)) safeX = width - (config.radius + 5);

                const newItem = createItem(safeX, 35, currentBallLevel);
                Composite.add(engine.world, newItem);

                currentBallLevel = nextBallLevel;
                nextBallLevel = getRandomBallLevel();

                updateNextIndicator();
                updatePreviewBall(safeX);
            }
        };

        document.getElementById('game-container').onclick = handleRelease;
        document.getElementById('game-container').ontouchend = function(e) {
            e.preventDefault(); 
            handleRelease(e);
        };

        function createItem(x, y, level) {
            const config = levels[level];
            const scaleFactor = (config.radius * 2) / config.imgSize;

            const item = Bodies.circle(x, y, config.radius, {
                restitution: 0.2,
                friction: 0.1,
                label: 'game-item',
                render: { 
                    sprite: {
                        texture: config.img,
                        xScale: scaleFactor,
                        yScale: scaleFactor
                    }
                }
            });
            item.gameLevel = Number(level);
            item.spawnTime = Date.now(); 
            return item;
        }

        function setupCollision() {
            Events.on(engine, 'collisionStart', (event) => {
                if (isPaused || isGameOver) return;
                const pairs = event.pairs;
                
                pairs.forEach((pair) => {
                    const bodyA = pair.bodyA;
                    const bodyB = pair.bodyB;

                    if (bodyA.label === 'game-item' && bodyB.label === 'game-item') {
                        if (bodyA.gameLevel === bodyB.gameLevel && !bodyA.isDead && !bodyB.isDead) {
                            
                            const currentLevel = bodyA.gameLevel;
                            const nextLevel = levels[currentLevel].next;

                            bodyA.isDead = true;
                            bodyB.isDead = true;

                            const newX = (bodyA.position.x + bodyB.position.x) / 2;
                            const newY = (bodyA.position.y + bodyB.position.y) / 2;

                            score += levels[currentLevel].score;
                            document.getElementById('score').innerText = score;

                            playMergeSound(currentLevel);

                            setTimeout(() => {
                                Composite.remove(engine.world, bodyA);
                                Composite.remove(engine.world, bodyB);

                                if (nextLevel) {
                                    const upgradedItem = createItem(newX, newY, nextLevel);
                                    Composite.add(engine.world, upgradedItem);
                                    
                                    if (nextLevel === 10 && !hasUnlockedMaxLevel) {
                                        hasUnlockedMaxLevel = true;
                                        spawnRomanticCelebration(newX, newY);
                                    }
                                }
                            }, 0);
                        }
                    }
                });
            });
        }

        function setupGameLoop() {
            Events.on(engine, 'afterUpdate', () => {
                if (isPaused || isGameOver) return;

                const allBodies = Composite.allBodies(engine.world);
                let isOverflowing = false;

                for (let body of allBodies) {
                    if (body.label === 'game-item') {
                        if (Date.now() - body.spawnTime < 1500) continue;

                        const itemTopEdge = body.position.y - body.circleRadius;

                        if (itemTopEdge < deadlineY) {
                            isOverflowing = true;
                            break;
                        }
                    }
                }

                const indicator = document.getElementById('deadline-indicator');

                if (isOverflowing) {
                    if (!indicator.classList.contains('warning')) {
                        indicator.classList.add('warning');
                    }
                    if (!gameOverTimer) {
                        gameOverTimer = setTimeout(() => {
                            triggerGameOver();
                        }, 8000); 
                    }
                } else {
                    if (indicator.classList.contains('warning')) {
                        indicator.classList.remove('warning');
                        indicator.style.borderTopColor = 'rgba(255, 255, 255, 0.4)';
                    }
                    if (gameOverTimer) {
                        clearTimeout(gameOverTimer);
                        gameOverTimer = null;
                    }
                }
            });
        }

        function triggerGameOver() {
            isGameOver = true;
            engine.timing.timeScale = 0; 
            stopTimer(); 
            playGameOverSound(); 
            
            setTimeout(() => {
                alert("i'm king of the game");
            }, 100);
        }

        document.getElementById('btn-restart').addEventListener('click', (e) => {
            e.stopPropagation(); 
            initGame(); 
        });

        document.getElementById('btn-pause').addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (isGameOver) return; 
            isPaused = !isPaused;
            
            updatePauseButtonUI();

            if (isPaused) {
                engine.timing.timeScale = 0; 
                if (bgm) bgm.pause(); 
                document.getElementById('pause-overlay').style.display = 'flex';
            } else {
                engine.timing.timeScale = 1; 
                if (bgm && isBgmStarted) bgm.play(); 
                document.getElementById('pause-overlay').style.display = 'none';
            }
        });

        initGame();
        drawFX();
    </script>
</body>
</html>
